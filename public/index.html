<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>剪報看板｜即時新聞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="board-header">
    <div class="header-inner">
      <div class="title-block">
        <span class="eyebrow">EDITOR'S CORKBOARD</span>
        <h1>剪報看板</h1>
      </div>
      <div class="live-status" id="liveStatus">
        <span class="live-dot" aria-hidden="true"></span>
        <span class="live-text">
          <strong>LIVE</strong>
          <span id="updatedAgo">尚未更新</span>
        </span>
      </div>
    </div>
  </header>

  <section class="overview-zone" id="overviewZone">
    <!-- 今日焦點內容由 script.js 自動載入並放在這裡 -->
  </section>

  <div class="section-divider">
    <span>選擇分類看即時新聞</span>
  </div>

  <nav class="tag-rail" id="tagRail" aria-label="新聞分類"></nav>

  <main class="board" id="board">
    <div class="board-texture" aria-hidden="true"></div>
    <div id="content">
      <div class="state-message">點選上面的分類，看即時新聞</div>
    </div>
  </main>

  <footer class="board-footer">
    <p>每次開啟網站，都會即時向新聞來源重新抓取並由 AI 整理。內容僅供參考，請以原始新聞來源為準。</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
