name: Weekly History Report

on:
  schedule:
    # 每週一 UTC 22:00 = 台灣時間早上 06:00 執行
    - cron: "0 22 * * 1"
  workflow_dispatch: {}

jobs:
  run-history:
    runs-on: ubuntu-latest
    steps:
      - name: 簽出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests

      - name: 執行歷史統整腳本
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NEWS_DATABASE_ID: ${{ secrets.NEWS_DATABASE_ID }}
          DAILY_REPORT_DATABASE_ID: ${{ secrets.DAILY_REPORT_DATABASE_ID }}
          HISTORY_DAYS: "7"
        run: python history_report.py
